sonar.organization=silensses-maker
sonar.projectKey=silensses-maker_front_BES

sonar.sources=src
sonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# UI components, API clients (black-box tested), and pure type files are excluded from unit coverage
sonar.coverage.exclusions=\
  src/**/ui/**,\
  src/**/types/**,\
  src/app/**,\
  src/pages/**,\
  src/shared/api/**

sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Locale files are intentionally identical in structure (same keys, different translated values)
sonar.cpd.exclusions=src/shared/i18n/locales/**
