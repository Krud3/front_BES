name: CI

on:
  push:
    branches: [main, refactor]
  pull_request:
    branches: [main, refactor]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Run tests
        run: bunx vitest run

  check-version:
    name: Version Bump Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current version
        id: current
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Get base version
        id: base
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          echo "version=$(git show origin/${{ github.base_ref }}:package.json | jq -r .version)" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        run: |
          BASE="${{ steps.base.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"

          echo "Base version: $BASE"
          echo "Current version: $CURRENT"

          if [ "$BASE" = "$CURRENT" ]; then
            echo "::error::Version not bumped. Update version in package.json (current: $CURRENT)"
            exit 1
          fi

          HIGHER=$(echo -e "$BASE\n$CURRENT" | sort -V | tail -1)

          if [ "$HIGHER" != "$CURRENT" ]; then
            echo "::error::Version must be higher than $BASE (got: $CURRENT)"
            exit 1
          fi

          echo "Version bumped: $BASE → $CURRENT"
