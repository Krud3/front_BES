name: Release Please

on:
  push:
    branches: [refactor]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: refactor
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
